<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	 xmlns:f="http://java.sun.com/jsf/core"	
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
      
      <h:outputScript name="locales/locale-de.js" library="primefaces" />
<h:outputScript name="locales/locale-es.js" library="primefaces" />
      
      <style>
    .ui-filter-column .ui-column-customfilter .custom-filter {
        width: 100%;
        box-sizing: border-box;
    }
</style>
      
      
<h:head>
    <title>Configuraciones de Venta</title>
</h:head>
<h:body>
 
 <h:form id="form">    
         
         <p:growl id="messages" showDetail="true" />

	        <p:toolbar>
	            <p:toolbarGroup>
                <p:commandButton value="Nueva" icon="pi pi-plus" actionListener="#{configuracionesController.newConfiguration()}"
                    update=":dialogs:manage-product-content" oncomplete="PF('manageProductDialog').show()"
                    styleClass="ui-button-success" style="margin-right: .5rem">
                    <p:resetInput target=":dialogs:manage-product-content" />
                </p:commandButton>
            </p:toolbarGroup>
        </p:toolbar>

        <p:dataTable id="dt-products" widgetVar="dtProducts" var="configuracion" value="#{configuracionesController.listaConfiguraciones}"
            reflow="true" styleClass="products-table"  selection="#{configuracionesController.configuracionSelected}"
            rowKey="#{configuracion.nombre}" paginator="true" rows="10" selectionRowMode="add" paginatorPosition="bottom">
            <f:facet name="header">
                <div class="products-table-header">
                    <span style="font-weight: bold">Configuracioes de Venta</span>
                </div>
            </f:facet>

            <p:column headerText="Name" sortBy="#{configuracion.nombre}" filterBy="#{configuracion.nombre}">
                <h:outputText value="#{configuracion.nombre}" />
            </p:column>
            <p:column headerText="Fecha de Inicio" exportable="false">
                <h:outputText value="#{configuracion.fechaInicio}">
                    <f:convertDateTime pattern="dd/MM/yyyy" />
                </h:outputText>
            </p:column>
            <p:column headerText="Fecha Final" exportable="false">
                <h:outputText value="#{configuracion.fechaFin}">
                    <f:convertDateTime pattern="dd/MM/yyyy" />
                </h:outputText>
            </p:column>
            <p:column headerText="$ Venta" sortBy="#{configuracion.previoVenta}">
                <h:outputText value="#{configuracion.previoVenta}" style="font-weight: 700">
                    <f:convertNumber currencySymbol="$" type="currency" />
                </h:outputText>
            </p:column>
            <p:column headerText="Tipo de Comfiguración" sortBy="#{configuracion.nombreEstatus}" filterBy="#{configuracion.nombreEstatus}">
                <h:outputText value="#{configuracion.nombreTipoConfiguracion}" />
            </p:column>
            <p:column exportable="false" ariaHeaderText="Actions">
	                <p:commandButton icon="pi pi-pencil" update=":dialogs:manage-product-content"
	                    oncomplete="PF('manageProductDialog').show()"
	                    styleClass="edit-button rounded-button ui-button-success" process="@this"
	                    actionListener="#{configuracionesController.cha()}">
	                    <f:setPropertyActionListener value="#{configuracion}" target="#{configuracionesController.configuracionSelected}" />
	                    <p:resetInput target=":dialogs:manage-product-content" />
	                </p:commandButton>
                <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash"
                                 process="@this"
                                 oncomplete="PF('deleteProductDialog').show()">
                    <f:setPropertyActionListener value="#{configuracion}" target="#{configuracionesController.configuracionSelected}" />
                </p:commandButton>
            </p:column>

        </p:dataTable>
            
            
        
          
    </h:form>
    
    <p:dialog header="Header" widgetVar="dlg2" minHeight="40" width="350" showEffect="fade" modal="true" closeOnEscape="true">
	    <p class="m-0">Nueva Configuración de Venta</p>
	</p:dialog>
	
	<h:form id="dialogs">
	<p:growl id="msgs" showDetail="true"
					skipDetailIfEqualsSummary="true" />
        <p:dialog header="Datos de la Configuración" showEffect="fade" modal="true" widgetVar="manageProductDialog"
            responsive="true" id="dlgnew" resizable="false" 
          fitViewport="true"
          style="max-height: 90vh;">
            <p:scrollPanel mode="native"  id="manage-product-content" class="ui-fluid">
                <p:outputPanel >
                
                	 <div class="field col-3 md:col-4w">
                	 <TABLE>
                    	<tr>
                    	 	<td align="center" width="30%">
                    	 		<p:outputLabel value="Tipo de Configuración" />
                    	 	</td>
                    	 	 <td align="center" width="30%">
                    	 		<p:outputLabel value="Nombre" />
                    	 	</td>
                    	 	<td align="center" width="30%">
                    	 		<p:outputLabel value="Campaña"/>
                    	 	</td>
                    	</tr>
                    	<tr>
                    	 	<td align="left" width="30%"> 
								<p:selectOneMenu 
							                 value="#{configuracionesController.configuracionSelected.idTipoConfiguracion}"
							                 editable="false" required="true">
							    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
								    <f:selectItems value="#{configuracionesController.listaTipos}" 
								                   var="tipo"
								                   itemValue="#{tipo.idTipoConfiguracion}" 
								                   itemLabel="#{tipo.clave} - #{tipo.nombre}"/>
								</p:selectOneMenu>
							</td>
							<td align="left" width="30%">
								<p:inputText id="nombre" value="#{configuracionesController.configuracionSelected.nombre}" required="true" />
							</td>	
                    	 	<td align="left" width="30%">
                    	 		<p:selectOneMenu id="campania"
							                 value="#{configuracionesController.campaniaSelected.idCampania}"
							                 editable="false" required="true">
							    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
								    <f:selectItems value="#{configuracionesController.listaCampanias}" 
								                   var="campania"
								                   itemValue="#{campania.idCampania}" 
								                   itemLabel="#{campania.nombre}"/>
								</p:selectOneMenu>
                    	 		
                    	 	</td>
                    	 	                    	 	
                    	</tr> 	
                    	 	
                	 </TABLE>
							    
			            </div>
                     
                    <div class="field col-3 md:col-4w">
                    	<TABLE>
                    		<tr>
                    			<td align="left" width="30%">
                    				<p:outputLabel for="fechaInicio">Fecha de Inicio</p:outputLabel>
                    			</td>
                    			
                    			<td align="left" width="30%">
                    				<p:outputLabel for="fechaFin">Fecha de Fin</p:outputLabel>
                    			</td>
                    			<td align="left" width="30%"> 
                    				<p:outputLabel>Precio de Venta</p:outputLabel>
                    			</td>
                    		</tr>
                    		<tr>
                    			<td align="left" width="30%">
                    				<p:datePicker id="fechaInicio" value="#{configuracionesController.fechaInicioSelected}">
										<p:ajax event="dateSelect"	listener="#{configuracionesController.onDateSelect}" update="msgs" />
									</p:datePicker>
                    			</td>
                    			<td align="left" width="30%">
                    				<p:datePicker id="fechaFin" value="#{configuracionesController.fechaFinSelected}">
										<p:ajax event="dateSelect"	listener="#{configuracionesController.onDateSelect}" update="msgs" />
									</p:datePicker>
								</td>	
								<td align="left" width="30%">  
									<p:inputNumber id="precio" value="#{configuracionesController.configuracionSelected.previoVenta}" />
								</td>
                    			
                    		</tr>
                    	</TABLE>
		            </div>
                </p:outputPanel>
           </p:scrollPanel>
            <!--  oncomplete="PF('moviePicker').show()" -->
             <p:scrollPanel mode="native" style="width:850px;height:780px">
			            <p:toolbar>
            					Agregar productos
            			</p:toolbar>	
            				
			            
			           <!-- 
			           <p:commandButton id="movieBtn" value="Find" icon="pi pi-search"
			           		 onclick="PF('dlg2').show()">
						    <p:ajax event="click" 
						            listener="#{configuracionesController.getProductsActives()}" 
						            update="" />
						</p:commandButton>
						  -->
						<p:dataTable id="checkboxDT" var="product" value="#{configuracionesController.listaSelectedTemp}"
					                     selection="#{configuracionesController.listaProductos}" rowKey="#{product.idProducto}"
					                     style="margin-bottom:0" paginator="true" rows="5" 
					                     selectionPageOnly="false" selectionRowMode="none" cellNavigation="true"
					                      scrollRows="20" scrollable="true" liveScroll="true" scrollHeight="550">
					            <p:column>
					            	<p:selectBooleanCheckbox value="#{product.productIsSelected}">
							            <p:ajax update="input1" />
							        </p:selectBooleanCheckbox>
					            </p:column>
					            
					            <p:column headerText="Code">
					                <h:outputText value="#{product.clave}" />
					            </p:column>
					
					            <p:column headerText="Name">
					                <h:outputText value="#{product.nombre}" />
					            </p:column>
					
					            <p:column headerText="Category">
					                <h:outputText value="#{product.sku}" />
					            </p:column>
					
					            <p:column headerText="Quantity">
									<p:inputNumber id="input1" 
					                       value="#{product.cantidad}" 
					                       modifyValueOnWheel="false"
					                       disabled="#{!product.productIsSelected}" />
					            </p:column>
					        </p:dataTable>  
    		</p:scrollPanel>
			
            <f:facet name="footer">
             <p:commandButton value="Save" icon="pi pi-check"
                 actionListener="#{configuracionesController.saveConfiguracion()}"
                 update="@form"
                 process="@form"
                 oncomplete="PF('manageProductDialog').hide()"
                 style="margin-right: .5rem" />


                <p:commandButton value="Cancel" icon="pi pi-times" onclick="PF('manageProductDialog').hide()"
                    class="ui-button-secondary" type="button"  />
            </f:facet>
        </p:dialog>
        
        <p:dialog header="Header" widgetVar="dlg2" minHeight="40" 
        		width="350" showEffect="fade" modal="true" closeOnEscape="true" >
			
	        		</p:dialog>
       
        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300"
            message="Deseas eliminar esta configuración de VEnta" header="Confirm" severity="warn">
            <p:commandButton value="Yes" icon="pi pi-check" actionListener="#{configuracionesController.deleteConfiguracion()}" 
                process="@this" update="@this" 
                oncomplete="PF('deleteProductDialog').hide()" />
                
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times"
                onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                icon="pi pi-times" />
        </p:confirmDialog>
         
    </h:form>
	
</h:body>
</html>
