<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	 xmlns:f="http://java.sun.com/jsf/core"	
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
      
      <h:outputScript name="locales/locale-de.js" library="primefaces" />
<h:outputScript name="locales/locale-es.js" library="primefaces" />
      
      <style>
    .ui-filter-column .ui-column-customfilter .custom-filter {
        width: 100%;
        box-sizing: border-box;
    }
</style>
      
      
<h:head>
    <title>Gestion de Campañas</title>
</h:head>
<h:body>
 
 
  <h:form id="dialogs">
	 <p:growl id="msgs" showDetail="true"
					skipDetailIfEqualsSummary="true" />
            <p:outputPanel id="manage-product-content" class="ui-fluid">
                <p:outputPanel >
                    <div class="field">
                    	 <p:accordionPanel multiple="true" widgetVar="multiple" scrollIntoView="center">
				            <p:tab title="Datos del Cliente">
			                    <p:messages/>
                    
		                    	<h:panelGrid columns="2" columnClasses="label, value"
		             				style="width:50%; margin:0 auto;">
			                        <p:outputLabel for="nombre">Nombre</p:outputLabel>
			                       <p:inputText id="nombre" value="#{capturaPedidosController.personaPedido.nombre}" />
			                    </h:panelGrid>
			                    
			                    <h:panelGrid columns="2" columnClasses="label, value">
			                    	 <p:outputLabel for="apePat">Apellido Paterno</p:outputLabel>
			                  		 <p:inputText id="apePat" value="#{capturaPedidosController.personaPedido.apellidoPaterno}"  />
			                  		 
			           				 <p:outputLabel for="apeMat">Apellido Materno</p:outputLabel>
			                  		 <p:inputText id="apeMat" value="#{capturaPedidosController.personaPedido.apellidoMaterno}"  />
			                    	 
			                        <p:outputLabel for="tele">Telefono</p:outputLabel>
			                    	<p:inputMask id="tele" value="#{capturaPedidosController.personaPedido.telefono}" mask="(99) 9999-9999" validateMask="true" />
			
									<h:outputText value="correo electrónico"/>
		                   			<p:inputText id="email" 
							             value="#{pedidosController.personaPedido.correo}" 
							             type="email" placeholder="usuario@dominio.com">
							            
							             </p:inputText>
							             
									
			                    </h:panelGrid>
			                    
	                        </p:tab>
	                         <p:tab title="Datos del Cliente">
			                    <p:messages/>
			                     <h:panelGrid columns="4" columnClasses="label, value"
             						style="width:40%; margin:0 auto;">
             						
             						<h:outputText value="CP"/>
			                  		 <p:selectOneMenu 
								                 value="#{capturaPedidosController.cpSeleccionado}"
								                 editable="false" required="true" id="cpCbo">
								    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
									    <f:selectItems value="#{capturaPedidosController.listaCp}" 
									                   var="cp"
									                   itemValue="#{cp}" 
									                   itemLabel="#{cp}"/>
									     <p:ajax event="change" 
							                listener="#{capturaPedidosController.buscaColoniasByCp()}" 
							              update="coloniasCbo Estado Mcpio"  />        
									</p:selectOneMenu>
             						<h:outputText value="Colonia"/>
				                  		  <p:selectOneMenu 
									                 value="#{capturaPedidosController.coloniaSeleccioada.idColonia}"
									                 editable="false" required="true" id="coloniasCbo">
									    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
										    <f:selectItems value="#{capturaPedidosController.listaColonias}" 
										                   var="colonia"
										                   itemValue="#{colonia.idColonia}" 
										                   itemLabel="#{colonia.nombre}"/>
										    <p:ajax event="change" 
							                listener="#{capturaPedidosController.validaSeleccionColonia()}" 
							               update="Estado Mcpio"  />
										</p:selectOneMenu>
										
										<p:outputLabel for="Estado">Estado</p:outputLabel>
			                  		    <p:inputText id="Estado" value="#{capturaPedidosController.coloniaSeleccioada.nombreEstado}" disabled="true" />
			                  		 
			                  		 
				                  		 <p:outputLabel for="Mcpio">Municipio</p:outputLabel>
				                  		 <p:inputText id="Mcpio" value="#{capturaPedidosController.coloniaSeleccioada.nombreMunicipio}" disabled="true"  />
										
										 <h:outputText for="calle" value="Calle"/>
									 	 <p:inputText id="calle" value="#{capturaPedidosController.direccionPedido.calle}"  />
										
										 <h:outputText for="entreCalle" value="Entre Calles"/>
									 <p:inputText id="entreCalles" value="#{capturaPedidosController.direccionPedido.entreCalles}"/>
									 
									  <h:outputText for="numExterior" value="# Exterior"/>
									 <p:inputText id="numExterior" value="#{capturaPedidosController.direccionPedido.numeroExterior}" />
									 
									  <h:outputText for="numInterior" value="# Interior"/>
									 <p:inputText id="numInterior" value="#{capturaPedidosController.direccionPedido.numeroInterior}" />
			                    </h:panelGrid>
			                    <h:panelGrid columns="2" columnClasses="label, value"
								             style="width:50%; margin:0 auto;">
								    <h:outputText value="Referencias"/>
								    <p:inputTextarea rows="6" style="width:100%;" value="#{capturaPedidosController.direccionPedido.referencias}"/>
								</h:panelGrid>
                    		</p:tab>
                    		
                    		 <p:tab title="Datos del Pedido" id="pnDataPedido">
			                    <p:messages/>
			                    <h:panelGrid columns="2" columnClasses="label, value">
			                    	<h:outputText value="Campaña"/>
			                    	 <p:selectOneMenu value="#{capturaPedidosController.campaniaSelected.idCampania}"
									                 editable="false" required="true" id="cpCmapania">
									    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
										    <f:selectItems value="#{capturaPedidosController.listaCampanias}" 
										                   var="campania"
										                   itemValue="#{campania.idCampania}" 
										                   itemLabel="#{campania.nombre}"/>
										  <p:ajax event="change" 
							                listener="#{capturaPedidosController.buscaConfiguracionesByCampania()}" 
							               update="pnlGrid radioDT" />                   
										</p:selectOneMenu>
			                    </h:panelGrid>	
			                    <h:panelGrid columns="1" columnClasses="label, value" id="pnlGrid">
								 <p:splitter style="height: 300px" styleClass="mb-5" widgetVar="splitter">
							        <p:splitterPanel styleClass="flex align-items-center justify-content-center">
					        			 <p:dataTable id="radioDT" var="configuracion" value="#{capturaPedidosController.listaConfiguraciones}"
						         			selection="#{capturaPedidosController.configuraionSelected}" >
						         			
						         			<f:facet name="header">
						                <div class="products-table-header">
						                    <span style="font-weight: bold">Configuracioes de Venta</span>
						                </div>
						            </f:facet>
						            <p:column>
								          <p:selectBooleanCheckbox value="#{configuracion.selected}">
								          	 <p:ajax event="change"
											            listener="#{capturaPedidosController.viewDetailConfiguration(configuracion)}"
											            update=":dialogs:productDetail radioDT"
											            oncomplete="PF('productDialog').show()" />
											</p:selectBooleanCheckbox>

						            </p:column>
						            <p:column headerText="Nombre" sortBy="#{configuracion.nombre}">
						                <h:outputText value="#{configuracion.nombre}" />
						            </p:column>
						            <p:column headerText="$ Venta" sortBy="#{configuracion.previoVenta}">
					                <h:outputText value="#{configuracion.previoVenta}" style="font-weight: 700">
					                    <f:convertNumber currencySymbol="$" type="currency" />
					                </h:outputText>
					            </p:column>
						         			<f:facet name="footer">
							            <span class="font-bold">Total del pedido
							            	<h:outputText value="#{capturaPedidosController.montoTotal}" id="totalPed" />
							            </span>
							        </f:facet>
						         		</p:dataTable>
						         	<h:panelGrid columns="2" columnClasses="label, value"
									             style="width:50%; margin:0 auto;">
									    <h:outputText value="Observaciones Adicionales"/>
									    <p:inputTextarea rows="6" style="width:100%;" value="#{capturaPedidosController.formaPagoSelected.observaciones}"/>
									</h:panelGrid>		    
					        		</p:splitterPanel>
					        	 </p:splitter>	
					        	</h:panelGrid>
                    		</p:tab>
                    		 <p:tab title="Datos del Pago">
			                    <p:messages/>
			                     <h:panelGrid columns="4" columnClasses="label, value"
			             			style="width:50%; margin:0 auto;">
			                    	 <h:outputText value="Forma de PAgo"/>
			                    	  <p:selectOneMenu 
									                 value="#{capturaPedidosController.tipoFormaPagoSelected.idTipoFormaPago}"
									                 editable="false"  id="cboTipoForPa">
									    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
										    <f:selectItems value="#{capturaPedidosController.listaTiposFormaPago}" 
										                   var="tipo"
										                   itemValue="#{tipo.idTipoFormaPago}" 
										                   itemLabel="#{tipo.nombre}"/>
										     <p:ajax event="change" 
								                listener="#{capturaPedidosController.buscaFormaPago()}" 
								                update="cboFormaPago"  />       
										</p:selectOneMenu>
										<h:outputText value="Detalle del Pago"/>
					                    	  <p:selectOneMenu 
									                 value="#{capturaPedidosController.formaPagoSelected.idFormaPago}"
									                 editable="false" id="cboFormaPago">
									    <f:selectItem itemLabel="Selecciona uno" itemValue="0"/>
										    <f:selectItems value="#{capturaPedidosController.listaFormasPagoMostrar}" 
										                   var="tipo"
										                   itemValue="#{tipo.idFormaPago}" 
										                   itemLabel="#{tipo.nombre}"/>
										     <p:ajax event="change" 
								                listener="#{capturaPedidosController.selectFormaPago()}" 
								                 />       
										</p:selectOneMenu>
			                    </h:panelGrid>	 
			                    <h:panelGrid columns="2" columnClasses="label, value"
								             style="width:50%; margin:0 auto;">
								    <h:outputText value="Link de Pago"/>
								    <p:inputTextarea rows="6" style="width:100%;" value="#{capturaPedidosController.formaPagoSelected.linkPago}" />
								</h:panelGrid>
			                 </p:tab>   
	                    </p:accordionPanel>
                    </div>
                    
                    <p:dialog header="Productos en la Comfiguracion" widgetVar="productDialog" modal="true" showEffect="fade"
				              hideEffect="fade" resizable="false" width="30%" rendered="#{not empty capturaPedidosController.configuraionSelected}">
				        <p:outputPanel id="productDetail" style="text-align:center;">
				            <p:column rendered="#{not empty capturaPedidosController.configuraionSelected}">
				                <div class="product">
				                    <div class="product-grid-item card" style="margin-bottom: 0">
				                        <div class="product-grid-item-top">
				                            <div>
				                                <i class="pi pi-tag product-category-icon"/>
				                            </div>
				                           <!-- <span class="product-badge status-#{dtSelectionView.selectedProduct.inventoryStatus.name().toLowerCase()}">#{dtSelectionView.selectedProduct.inventoryStatus.text}</span>
				                           -->
				                        </div>
				                        <div class="product-grid-item-content">
				                            <p:dataTable id="radioDT" var="producto" value="#{capturaPedidosController.listaDetalle}"
										                      rowKey="#{producto.idProducto}" cellNavigation="true">
										            <f:facet name="header">
										                <div class="products-table-header">
										                    <span style="font-weight: bold">Productos</span>
										                </div>
										            </f:facet>
										            <p:column headerText="Nombre" sortBy="#{producto.nombre}">
										                <h:outputText value="#{producto.nombre}" />
										            </p:column>
										             <p:column headerText="Cantidad" sortBy="#{producto.cantidad}">
										                <h:outputText value="#{producto.cantidad}" />
										            </p:column>
										    </p:dataTable>        
				                        </div>
				                        <div class="product-grid-item-bottom">
				                           
				                           
				                        </div>
				                    </div>
				                </div>
				            </p:column>
				        </p:outputPanel>
				    </p:dialog>
                    
                </p:outputPanel>
            </p:outputPanel>
            
            <p:commandButton value="Save" icon="pi pi-check"  actionListener="#{capturaPedidosController.save()}" 
                     process="manage-product-content @this" />
                <p:commandButton value="Cancel" icon="pi pi-times" onclick="PF('manageProductDialog').hide()"
                    class="ui-button-secondary" type="button"  />
                   
	            
	                    

    </h:form>
	
	
	
</h:body>
</html>
