<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Gestion de Marcass</title>
</h:head>
<h:body>
    <h:form>

       <p:dataTable var="marca" value="#{marcaController.listaMarcas}">
            <p:column headerText="Clave">
                <h:outputText value="#{marca.clave}" />
            </p:column>
            <p:column headerText="Marca">
                <h:outputText value="#{marca.nombre}" />
            </p:column>
       </p:dataTable>     
    </h:form>
</h:body>
</html>
